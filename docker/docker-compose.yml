version: "3.9"

services:
  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    env_file:
      - ../backend/.env
    depends_on:
      - db
    networks:
      - hirescope-net

  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
      args:
        VITE_BACKEND_ORIGIN: /api
    networks:
      - hirescope-net

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: hirescope
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - hirescope-net

  nginx:
    image: nginx:alpine
    depends_on:
      - backend
      - frontend
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    ports:
      - "80:80"
      - "443:443"
    networks:
      - hirescope-net

networks:
  hirescope-net:

volumes:
  postgres_data:
